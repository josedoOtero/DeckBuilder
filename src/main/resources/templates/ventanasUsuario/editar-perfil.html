<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>

    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/header.css}" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        h2 {
            font-weight: 600;
        }

        .card {
            border-radius: 1rem;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        #fotoPerfil {
            transition: transform 0.2s ease;
        }

        #fotoPerfil:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .border-end {
                border: none !important;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-sm p-4" style="max-width: 950px; width: 100%;">

        <h2 class="mb-4 text-center">Edit Profile</h2>

        <div class="row align-items-start">

            <div class="col-md-4 text-center border-end">
                <img id="fotoPerfil"
                     th:src="${usuario.imagenUsuario != null ? usuario.imagenUsuario : '/img/fotoPerfil.png'}"
                     class="rounded-circle shadow mb-3"
                     style="width:200px;height:200px;object-fit:cover;border:3px solid #dee2e6;"
                     th:attr="data-usuario-id=${usuario.id}"
                     alt="User profile picture">

                <div class="d-grid gap-2 mb-3">
                    <button type="button" class="btn btn-outline-secondary btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#modalSeleccionarCarta">
                        Select card as image
                    </button>
                </div>
            </div>

            <div class="col-md-8 ps-md-4">
                <form th:action="@{/user/perfil}" th:object="${usuario}" method="post" novalidate>
                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{imagenUsuario}" id="imagenUsuarioHidden">

                    <div class="mb-3">
                        <label for="nombre">Name</label>
                        <input type="text" id="nombre" th:field="*{nombre}" readonly class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="descripcion">Description</label>
                        <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="3" maxlength="300"></textarea>
                    </div>

                    <div class="d-flex gap-2 flex-wrap mb-4">
                        <button type="button" class="btn btn-warning text-white" data-bs-toggle="modal" data-bs-target="#modalPassword">
                            Change Password
                        </button>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary flex-fill">Save Changes</button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary flex-fill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalPassword" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/user/perfil/password}" th:object="${passwordDTO}" method="post" novalidate>
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" for="actual">Current Password</label>
                        <input type="password" id="actual" th:field="*{actual}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="nueva">New Password</label>
                        <input type="password" id="nueva" th:field="*{nueva}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="repetir">Repeat New Password</label>
                        <input type="password" id="repetir" th:field="*{repetir}" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" type="submit">Change</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="modalSeleccionarCarta" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Select Card as Profile Image</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="filtro_cartas" class="d-flex mb-4 gap-2">
                    <input type="text" id="search" class="form-control" name="q" placeholder="Search by name...">
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>

                <div id="lista_cartas" class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<style>
    #lista_cartas .card {
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border-radius: 8px;
        overflow: hidden;
    }

    #lista_cartas .card:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    #lista_cartas .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }
</style>


<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/editarPerfil.js}"></script>
</body>



</html>
